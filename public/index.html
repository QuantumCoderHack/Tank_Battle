<!DOCTYPE html>
<html>
<head>
    <title>Savaş Oyunu</title>
</head>
<body>

<canvas id="game" width="1280" height="720"></canvas>

<div id="gameOver" style="
    display:none;
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-color:rgba(0,0,0,0.7);
    color:white;
    font-size:48px;
    text-align:center;
    padding-top:200px;
    z-index:10;
">
    Oyun Bitti! <br>
    Sayfayı yenileyip tekrar deneyin
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let players = {};
let bullets = [];

let keys = {};
let mouse = { x: 0, y: 0 };

const MAP_WIDTH = 2000;
const MAP_HEIGHT = 2000;

/* =========================
   🔊 SOUND SYSTEM (FIXED)
========================= */
const shootSound = new Audio("/shoot.mp3");
const reloadSound = new Audio("/reload.mp3");
const emptySound = new Audio("/empty.mp3");

function play(sound) {
    sound.pause();
    sound.currentTime = 0;
    sound.play().catch(() => {});
}

/* 🔥 Chrome autoplay fix */
window.addEventListener("click", () => {
    shootSound.load();
    reloadSound.load();
    emptySound.load();
}, { once: true });

/* =========================
   INPUT
========================= */
document.addEventListener("keydown", (e) => {
    const key = e.key.toLowerCase();
    keys[key] = true;

    if (key === "r") {
        socket.emit("reload");
        play(reloadSound);
    }

    if (["w","a","s","d"].includes(key)) {
        e.preventDefault();
    }
});

document.addEventListener("keyup", (e) => {
    keys[e.key.toLowerCase()] = false;
});

/* =========================
   MOUSE
========================= */
canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("click", () => {
    let me = players[socket.id];
    if (!me) return;

    socket.emit("shoot");

    if (me.ammo > 0) {
        play(shootSound);
    } else {
        play(emptySound);
    }
});

/* =========================
   SERVER DATA
========================= */
socket.on("update", (data) => {
    players = data.players || {};
    bullets = data.bullets || [];
});

/* =========================
   UPDATE
========================= */
function update() {
    let dx = 0;
    let dy = 0;

    if (keys["w"]) dy -= 3;
    if (keys["s"]) dy += 3;
    if (keys["a"]) dx -= 3;
    if (keys["d"]) dx += 3;

    socket.emit("move", { x: dx, y: dy });

    let me = players[socket.id];
    if (me) {
        let angle = Math.atan2(mouse.y - me.y, mouse.x - me.x);
        socket.emit("aim", angle);
    }
}

/* =========================
   DRAW PLAYER (FIXED LOOK)
========================= */
function drawPlayer(p) {
    if (!p) return;

    ctx.save();
    ctx.translate(Math.round(p.x), Math.round(p.y));
    ctx.rotate(p.angle || 0);

    ctx.fillStyle = p.color || "blue"; // 🔥 artık player.color kullanılıyor
    ctx.fillRect(-10, -10, 20, 20);

    ctx.fillStyle = "black";
    ctx.fillRect(0, -2, 15, 4);

    ctx.restore();
}

/* =========================
   BULLETS
========================= */
function drawBullets() {
    ctx.fillStyle = "red";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });
}

/* =========================
   UI
========================= */
function drawUI() {
    let me = players[socket.id];
    if (!me) return;

    ctx.fillStyle = "gray";
    ctx.fillRect(20, 20, 200, 20);

    ctx.fillStyle = "green";
    ctx.fillRect(20, 20, 200 * (me.health / me.maxHealth), 20);

    ctx.fillStyle = "black";
    ctx.font = "16px Arial";
    ctx.fillText(
        `HP: ${me.health} / ${me.maxHealth}`,
        230,
        35
    );
}

/* =========================
   DRAW LOOP
========================= */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let id in players) {
        drawPlayer(players[id]);
    }

    drawBullets();
    drawUI();
}

/* =========================
   GAME LOOP
========================= */
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();

/* =========================
   GAME OVER
========================= */
socket.on("gameOver", () => {
    document.getElementById("gameOver").style.display = "block";
});
</script>

</body>
</html>
